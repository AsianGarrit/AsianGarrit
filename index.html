<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsianGarrit - Store</title>
    <style>
        :root { --rosa-corporativo: #c24068; --azul-borde: #2b5884; --rosa-claro-texto: #f3a6bb; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: white; overflow: hidden; }

        /* HEADER */
        .header {
            background-color: var(--rosa-corporativo);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-shrink: 0;
        }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; background: white; object-fit: cover; }
        .brand-name { font-size: 45px; font-family: serif; font-weight: normal; }
        .cart-icon-top { width: 45px; filter: invert(0.8); }

        /* SECCIÓN DE BÚSQUEDA Y FILTROS */
        .search-section { padding: 15px 25px; text-align: center; flex-shrink: 0; border-bottom: 2px solid var(--rosa-corporativo); }
        
        .search-bar {
            width: 90%;
            padding: 10px 25px;
            border: 2px solid var(--azul-borde);
            border-radius: 30px;
            font-size: 22px;
            color: var(--rosa-claro-texto);
            font-style: italic;
            outline: none;
            margin-bottom: 15px;
        }

        .categories-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        /* Botones de categoría (píldoras) */
        .cat-pill {
            border: 2px solid var(--azul-borde);
            border-radius: 20px;
            padding: 6px 20px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--azul-borde);
            font-weight: bold;
            background: white;
        }
        .cat-pill:hover, .cat-pill.active { background-color: var(--azul-borde); color: white; }

        /* CONTENIDO PRINCIPAL DIVIDIDO (2/3 Tienda, 1/3 Carrito) */
        .main-content { display: flex; flex: 1; overflow: hidden; }

        /* TIENDA (2/3 de la pantalla) */
        .products-grid {
            flex: 2; /* Ocupa 2 partes */
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }

        /* CARD DE PRODUCTO */
        .product-card { background: white; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .prod-img { width: 100%; height: 150px; object-fit: contain; }
        .prod-info { font-weight: bold; margin-top: 10px; font-size: 16px; }
        .prod-price { color: var(--rosa-corporativo); font-weight: bold; font-size: 18px; }
        .prod-cat { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .card-btns { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-math { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; font-weight: bold; }
        
        .btn-agregar-main {
            background-color: var(--rosa-corporativo);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        /* CARRITO LATERAL INTEGRADO (1/3 de la pantalla) */
        .side-cart {
            flex: 1; /* Ocupa 1 parte */
            max-width: 350px;
            border-left: 2px solid var(--rosa-corporativo);
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
        }
        
        .cart-title-area { 
            display: flex; align-items: center; justify-content: center; 
            padding: 15px; gap: 10px; color: var(--rosa-claro-texto); font-weight: bold; font-size: 22px;
            background-color: #f4f4f4; border-bottom: 1px solid #eee;
        }
        
        .cart-list { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* ITEM EN CARRITO (Cápsula redondeada) */
        .cart-item {
            display: flex; align-items: center; border: 1px solid black; border-radius: 20px;
            padding: 8px 15px; margin-bottom: 10px; gap: 10px; background: white;
        }
        .cart-item-img { width: 40px; height: 40px; object-fit: contain; border-radius: 5px; }
        .cart-item-text { flex: 1; font-size: 14px; color: var(--rosa-claro-texto); font-weight: bold; font-style: italic; }
        .btn-del { color: var(--rosa-corporativo); cursor: pointer; font-size: 18px; padding-left: 10px; }

        .cart-footer { padding: 15px; border-top: 1px solid #eee; background: #f9f9f9; }
        .total-pago { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 10px; }

        .btn-order {
            background-color: #25d366; color: white; border: none; padding: 12px;
            width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        .btn-order:hover { background-color: #1ebe57; }

        /* RESPONSIVO PARA CELULARES */
        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .side-cart { max-width: 100%; height: 40%; border-left: none; border-top: 2px solid var(--rosa-corporativo); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <img src="<img src="logo.png" class="logo-img" alt="Logo">
            <span class="brand-name">AsianGarrit</span>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" class="cart-icon-top" alt="Carrito">
    </header>

    <div class="search-section">
        <input type="text" class="search-bar" placeholder="Encuentra lo que buscas...">
        <div class="categories-container" id="categoryFilters">
            <div class="cat-pill active" onclick="filtrarProductos('todos')">Todos</div>
            <div class="cat-pill" onclick="filtrarProductos('Ramen')">Ramen 🍜</div>
            <div class="cat-pill" onclick="filtrarProductos('Snacks')">Snacks 🍪</div>
            <div class="cat-pill" onclick="filtrarProductos('Bebidas')">Bebidas 🥤</div>
            <div class="cat-pill" onclick="filtrarProductos('Dulces')">Dulces 🍬</div>
        </div>
    </div>

    <div class="main-content">
        <div class="products-grid" id="grid">
            </div>

        <aside class="side-cart">
            <div class="cart-title-area">
                <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" width="30" style="filter: opacity(0.5);">
                Mi Pedido
            </div>
            <div id="cartItems" class="cart-list">
                <p style="text-align:center; color:#999; margin-top:20px;">Tu carrito está vacío</p>
            </div>
            <div class="cart-footer">
                <div class="total-pago" id="totalCart">Total: $0</div>
                <button class="btn-order" onclick="enviarWsp()">Encargar pedido 🛒</button>
            </div>
        </aside>
    </div>

    <script>
        // --- BASE DE DATOS DE PRODUCTOS ---
        // Asegúrate de poner la categoría exacta que usas en los filtros de arriba.
        let inventario = [
            { id: 1, nombre: "Shin Ramen", precio: 2500, cat: "Ramen", img: "https://j-shop.cl/wp-content/uploads/2020/08/shin-red.png", cant: 0 },
            { id: 2, nombre: "Pocky Frutilla", precio: 1500, cat: "Snacks", img: "https://m.media-amazon.com/images/I/71bZ9l-jS2L._SL1500_.jpg", cant: 0 },
            { id: 3, nombre: "Ramune Fresa", precio: 1800, cat: "Bebidas", img: "https://j-shop.cl/wp-content/uploads/2021/04/ramune-strawberry.jpg", cant: 0 },
            { id: 4, nombre: "KitKat Matcha", precio: 1200, cat: "Dulces", img: "https://m.media-amazon.com/images/I/71yR3wDnd+L._SL1500_.jpg", cant: 0 },
            { id: 5, nombre: "Ramen Queso", precio: 2600, cat: "Ramen", img: "https://via.placeholder.com/150", cant: 0 }
        ];

        // Variable para saber qué categoría estamos viendo
        let categoriaActual = 'todos';

        // --- FUNCIÓN PRINCIPAL DE RENDERIZADO ---
        function render() {
            const grid = document.getElementById('grid');
            const cartItems = document.getElementById('cartItems');
            const totalCart = document.getElementById('totalCart');
            grid.innerHTML = "";
            cartItems.innerHTML = "";

            let totalGeneral = 0;
            let productosMostrados = 0;

            inventario.forEach(p => {
                // 1. Filtrar productos para la tienda
                if (categoriaActual === 'todos' || p.cat === categoriaActual) {
                    productosMostrados++;
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${p.img}" class="prod-img" alt="${p.nombre}">
                            <div class="prod-info">${p.nombre}</div>
                            <div class="prod-price">$${p.precio.toLocaleString('es-CL')}</div>
                            <span class="prod-cat">${p.cat}</span>
                            <div class="card-btns">
                                ${p.cant === 0 ? 
                                    `<button class="btn-agregar-main" onclick="updateCant(${p.id}, 1)">Agregar</button>` :
                                    `<button class="btn-math" onclick="updateCant(${p.id}, -1)">-</button>
                                     <span style="font-weight:bold">${p.cant}</span>
                                     <button class="btn-math" onclick="updateCant(${p.id}, 1)">+</button>`
                                }
                            </div>
                        </div>`;
                }

                // 2. Renderizar productos en el carrito lateral
                if(p.cant > 0) {
                    const subtotal = p.precio * p.cant;
                    totalGeneral += subtotal;
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <img src="${p.img}" class="cart-item-img" alt="${p.nombre}">
                            <div class="cart-item-text">
                                ${p.nombre}<br>
                                <span style="font-size:11px; font-style:normal; color:#555;">${p.cant} x $${p.precio.toLocaleString('es-CL')}</span>
                            </div>
                            <div style="font-weight:bold; color:black; font-size:13px;">$${subtotal.toLocaleString('es-CL')}</div>
                            <div class="btn-del" onclick="updateCant(${p.id}, -${p.cant})">🗑️</div>
                        </div>`;
                }
            });

            // Mensajes de estado
            if(productosMostrados === 0) grid.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#999; margin-top:50px;">No hay productos en la categoría "${categoriaActual}"</p>`;
            if(totalGeneral === 0) cartItems.innerHTML = '<p style="text-align:center; color:#999; margin-top:30px;">Tu carrito está vacío</p>';
            
            totalCart.innerText = `Total: $${totalGeneral.toLocaleString('es-CL')}`;
        }

        // --- FUNCIÓN PARA ACTUALIZAR CANTIDADES ---
        function updateCant(id, delta) {
            const p = inventario.find(item => item.id === id);
            p.cant += delta;
            if(p.cant < 0) p.cant = 0;
            render();
        }

        // --- FUNCIÓN DE FILTRO POR CATEGORÍA ---
        function filtrarProductos(categoria) {
            categoriaActual = categoria;
            
            // Actualizar estado visual de los botones
            const pills = document.querySelectorAll('.cat-pill');
            pills.forEach(pill => pill.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            
            render();
        }

        // --- FUNCIÓN ENVÍO WHATSAPP ---
        function enviarWsp() {
            let pedido = inventario.filter(p => p.cant > 0);
            if(pedido.length === 0) return alert("Tu carrito está vacío");
            
            let msg = "¡Hola AsianGarrit! 🍜 Quiero encargar:\n\n";
            let total = 0;
            pedido.forEach(p => {
                let sub = p.precio * p.cant;
                msg += `• ${p.cant}x ${p.nombre} ($${sub.toLocaleString('es-CL')})\n`;
                total += sub;
            });
            msg += `\n*Total a pagar: $${total.toLocaleString('es-CL')}*`;
            
            window.open(`https://wa.me/56958420744?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Iniciar tienda
        render();
    </script>
</body>
</html>
