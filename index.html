<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsianGarrit - Store</title>
    <style>
        :root { --rosa-corporativo: #c24068; --azul-borde: #2b5884; --rosa-claro-texto: #f3a6bb; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: white; overflow: hidden; }

        /* HEADER */
        .header {
            background-color: var(--rosa-corporativo);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 1001;
            flex-shrink: 0;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; background: white; object-fit: cover; }
        .brand-name { font-size: 32px; font-family: serif; }
        
        /* CONTENEDOR ICONO CARRITO + CONTADOR */
        .cart-container-top { position: relative; cursor: pointer; display: flex; align-items: center; }
        .cart-icon-top { width: 40px; filter: invert(1); transition: 0.3s; }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff0000;
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--rosa-corporativo);
            visibility: hidden; /* Se muestra solo si hay productos */
        }

        /* BUSCADOR Y CATEGORÍAS */
        .search-section { padding: 10px; text-align: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .search-bar {
            width: 80%; padding: 8px 20px; border: 2px solid var(--azul-borde);
            border-radius: 20px; font-size: 18px; color: var(--rosa-claro-texto); outline: none; margin-bottom: 10px;
        }
        .categories-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .cat-pill {
            border: 1.5px solid var(--azul-borde); border-radius: 15px;
            padding: 4px 15px; cursor: pointer; font-size: 13px; font-weight: bold; background: white;
        }
        .cat-pill.active { background-color: var(--azul-borde); color: white; }

        /* CONTENIDO */
        .main-content { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* PRODUCTOS COMPACTOS */
        .products-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
        }

        .product-card { 
            background: white; border-radius: 12px; padding: 10px; 
            text-align: center; border: 1px solid #eee; height: fit-content;
        }
        .prod-img { width: 100px; height: 100px; object-fit: contain; }
        .prod-info { font-weight: bold; font-size: 14px; margin: 5px 0; }
        .prod-price { color: var(--rosa-corporativo); font-weight: bold; font-size: 15px; margin-bottom: 8px; }
        .btn-agregar-main {
            background-color: var(--rosa-corporativo); color: white; border: none;
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px;
        }

        /* CARRITO LATERAL */
        .side-cart {
            position: absolute;
            right: -100%;
            top: 0;
            width: 33.33%; 
            height: 100%;
            background: white;
            border-left: 2px solid var(--rosa-corporativo);
            display: flex;
            flex-direction: column;
            transition: 0.4s ease-in-out;
            z-index: 1000;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .side-cart.open { right: 0; }

        .cart-title-area { padding: 15px; font-weight: bold; font-size: 20px; background: #f4f4f4; display: flex; justify-content: space-between; }
        .close-cart { cursor: pointer; color: var(--rosa-corporativo); font-size: 24px; }
        .cart-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .cart-item {
            display: flex; align-items: center; border: 1px solid black; border-radius: 15px;
            padding: 8px; margin-bottom: 8px; gap: 8px; font-size: 13px;
        }
        .cart-item-img { width: 35px; height: 35px; object-fit: contain; }
        
        .cart-footer { padding: 15px; border-top: 1px solid #eee; text-align: center; background: #fff; }
        .btn-order { background: #25d366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { .side-cart { width: 85%; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <img src="logo.png" class="logo-img" alt="Logo">
            <span class="brand-name">AsianGarrit</span>
        </div>
        <div class="cart-container-top" onclick="toggleCart()">
            <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" class="cart-icon-top" alt="Abrir Carrito">
            <div id="cartCount" class="cart-badge">0</div>
        </div>
    </header>

    <div class="search-section">
        <input type="text" id="searchInput" class="search-bar" placeholder="Encuentra lo que buscas..." onkeyup="filtrarPorNombre()">
        
        <div class="categories-container">
            <div class="cat-pill active" onclick="filtrarCategoria('todos')">Todos</div>
            <div class="cat-pill" onclick="filtrarCategoria('Ramen')">Ramen 🍜</div>
            <div class="cat-pill" onclick="filtrarCategoria('Snacks')">Snacks 🍪</div>
            <div class="cat-pill" onclick="filtrarCategoria('Bebidas')">Bebidas 🥤</div>
            <div class="cat-pill" onclick="filtrarCategoria('Ramen Pote')">Ramen 🍜</div>
        </div>
    </div>

    <div class="main-content">
        <div class="products-grid" id="grid"></div>

        <aside class="side-cart" id="sideCart">
            <div class="cart-title-area">
                Mi Pedido
                <span class="close-cart" onclick="toggleCart()">✕</span>
            </div>
            <div id="cartItems" class="cart-list"></div>
            <div class="cart-footer">
                <div id="totalCart" style="font-weight:bold; margin-bottom:10px; font-size:18px;">Total: $0</div>
                <button class="btn-order" onclick="enviarWsp()">Encargar pedido 🛒</button>
            </div>
        </aside>
    </div>

    <script>
        let inventario = [
            { id: 1, nombre: "Buldak Rosé", precio: 2200, cat: "Ramen", img: "imagenes/rosé.png", cant: 0 },
            { id: 2, nombre: "Chappaggeti en pote", precio: 2500, cat: "Ramen Pote", img: "imagenes/chappa_pote.jpg", cant: 0 },
            { id: 3, nombre: "Jin Veggie", precio: 2200, cat: "Ramen", img: "imagenes/veggie.jpg", cant: 0 }
        ];

        let catActual = 'todos';
        let textoBusqueda = '';

        function toggleCart() {
            document.getElementById('sideCart').classList.toggle('open');
        }

        function filtrarPorNombre() {
            textoBusqueda = document.getElementById('searchInput').value.toLowerCase();
            render();
        }

        function filtrarCategoria(c) {
            catActual = c;
            document.querySelectorAll('.cat-pill').forEach(pill => pill.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const cartItems = document.getElementById('cartItems');
            const cartBadge = document.getElementById('cartCount');
            
            grid.innerHTML = ""; 
            cartItems.innerHTML = "";
            
            let totalDinero = 0;
            let totalProductos = 0;

            inventario.forEach(p => {
                const coincideCat = (catActual === 'todos' || p.cat === catActual);
                const coincideNombre = p.nombre.toLowerCase().includes(textoBusqueda);

                if (coincideCat && coincideNombre) {
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${p.img}" class="prod-img">
                            <div class="prod-info">${p.nombre}</div>
                            <div class="prod-price">$${p.precio.toLocaleString('es-CL')}</div>
                            <button class="btn-agregar-main" onclick="update(${p.id}, 1)">
                                ${p.cant > 0 ? 'Añadido ('+p.cant+')' : 'Agregar'}
                            </button>
                        </div>`;
                }

                if(p.cant > 0) {
                    totalDinero += (p.precio * p.cant);
                    totalProductos += p.cant; // Sumamos para el contador rojo
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <img src="${p.img}" class="cart-item-img">
                            <div style="flex:1"><b>${p.nombre}</b><br>${p.cant} unid.</div>
                            <div onclick="update(${p.id}, -${p.cant})" style="cursor:pointer; color:red;">🗑️</div>
                        </div>`;
                }
            });
            
            // Actualizar contador rojo
            if(totalProductos > 0) {
                cartBadge.innerText = totalProductos;
                cartBadge.style.visibility = 'visible';
            } else {
                cartBadge.style.visibility = 'hidden';
            }

            document.getElementById('totalCart').innerText = "Total: $" + totalDinero.toLocaleString('es-CL');
            if(totalDinero === 0) cartItems.innerHTML = '<p style="text-align:center; color:#999;">Vacío</p>';
        }

        function update(id, delta) {
            const p = inventario.find(i => i.id === id);
            p.cant += delta; if(p.cant < 0) p.cant = 0;
            render();
        }

        function enviarWsp() {
            let pedido = inventario.filter(p => p.cant > 0);
            if(pedido.length === 0) return alert("Carrito vacío");
            let msg = "¡Hola AsianGarrit! 🍜 Quiero encargar:\n\n" + 
                      pedido.map(p => `- ${p.cant}x ${p.nombre} ($${(p.precio * p.cant).toLocaleString('es-CL')})`).join("\n") +
                      "\n\nTotal: " + document.getElementById('totalCart').innerText;
            window.open(`https://wa.me/56958420744?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
