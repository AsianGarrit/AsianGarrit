<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsianGarrit - Store</title>
    <style>
        :root { --rosa-corporativo: #c24068; --azul-borde: #2b5884; --rosa-claro-texto: #f3a6bb; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: white; overflow: hidden; }

        /* HEADER */
        .header {
            background-color: var(--rosa-corporativo);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 1001;
            flex-shrink: 0;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; background: white; object-fit: cover; }
        .brand-name { font-size: 32px; font-family: serif; }
        
        .cart-container-top { position: relative; cursor: pointer; display: flex; align-items: center; }
        .cart-icon-top { width: 40px; filter: invert(1); transition: 0.3s; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px; background-color: #ff0000; color: white;
            font-size: 12px; font-weight: bold; width: 20px; height: 20px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; border: 2px solid var(--rosa-corporativo); visibility: hidden;
        }

        /* BUSCADOR Y CATEGORÍAS */
        .search-section { padding: 10px; text-align: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .search-bar {
            width: 80%; padding: 8px 20px; border: 2px solid var(--azul-borde);
            border-radius: 20px; font-size: 18px; color: var(--rosa-claro-texto); outline: none; margin-bottom: 10px;
        }
        .categories-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
        .cat-pill {
            border: 1.5px solid var(--azul-borde); border-radius: 15px;
            padding: 4px 15px; cursor: pointer; font-size: 13px; font-weight: bold; background: white;
        }
        .cat-pill.active { background-color: var(--azul-borde); color: white; }

        /* PRODUCTOS */
        .main-content { display: flex; flex: 1; overflow: hidden; position: relative; }
        .products-grid {
            flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 20px; padding-bottom: 120px; overflow-y: auto;
        }
        .product-card { background: white; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #eee; height: fit-content; }
        .prod-img { width: 100px; height: 100px; object-fit: contain; }
        .btn-agregar-main { background-color: var(--rosa-corporativo); color: white; border: none; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; }

        /* CARRITO (FIXED) */
        .side-cart {
            position: fixed; right: -100%; top: 0; width: 33.33%; height: 100vh; 
            background: white; border-left: 2px solid var(--rosa-corporativo);
            display: flex; flex-direction: column; transition: 0.4s ease-in-out;
            z-index: 2000; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .side-cart.open { right: 0; }
        .cart-title-area { padding: 15px; font-weight: bold; font-size: 20px; background: #f4f4f4; display: flex; justify-content: space-between; align-items: center; }
        .cart-list { flex: 1; overflow-y: auto; padding: 10px; }
        .cart-item { display: flex; align-items: center; border: 1px solid black; border-radius: 15px; padding: 8px; margin-bottom: 8px; gap: 8px; font-size: 13px; }

        /* PIE DEL CARRITO MODIFICADO */
        .cart-footer { 
            flex-shrink: 0; padding: 15px; border-top: 1px solid #eee; background: #fff;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }

        /* Mensaje promocional solicitado */
        .promo-msg {
            text-align: center; font-weight: bold; font-style: italic; font-size: 14px;
            color: #333; line-height: 1.2; margin-top: 5px;
        }

        .cart-buttons-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .total-box { flex: 1; border: 2px solid var(--azul-borde); border-radius: 8px; padding: 10px 5px; font-weight: bold; text-align: center; color: var(--azul-borde); }
        .btn-order { flex: 1.5; background: #25d366; color: white; border: none; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { 
            .side-cart { width: 100%; } 
            .cart-footer { padding-bottom: 90px; } /* Ajuste de altura para celulares */
            .promo-msg { font-size: 13px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <img src="logo.png" class="logo-img" alt="Logo">
            <span class="brand-name">AsianGarrit</span>
        </div>
        <div class="cart-container-top" onclick="toggleCart()">
            <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" class="cart-icon-top" alt="Abrir Carrito">
            <div id="cartCount" class="cart-badge">0</div>
        </div>
    </header>

    <div class="search-section">
        <input type="text" id="searchInput" class="search-bar" placeholder="Encuentra lo que buscas..." onkeyup="filtrarPorNombre()">
        <div class="categories-container">
            <div class="cat-pill active" onclick="filtrarCategoria('todos')">Todos</div>
            <div class="cat-pill" onclick="filtrarCategoria('Ramen')">Ramen 🍜</div>
            <div class="cat-pill" onclick="filtrarCategoria('Snacks')">Snacks 🍪</div>
            <div class="cat-pill" onclick="filtrarCategoria('Bebidas')">Bebidas 🥤</div>
            <div class="cat-pill" onclick="filtrarCategoria('Ramen Pote')">Ramen Pote 🍲</div>
        </div>
    </div>

    <div class="main-content">
        <div class="products-grid" id="grid"></div>
    </div>

    <aside class="side-cart" id="sideCart">
        <div class="cart-title-area">
            Mi Pedido
            <span style="cursor:pointer; color:var(--rosa-corporativo);" onclick="toggleCart()">✕</span>
        </div>
        <div id="cartItems" class="cart-list"></div>
        <div class="cart-footer">
            <div class="cart-buttons-row">
                <button class="btn-order" onclick="enviarWsp()">Encargar pedido 🛒</button>
                <div id="totalCart" class="total-box">Total: $0</div>
            </div>
            <div class="promo-msg">
                "Envíos a todo Chile,<br>los mejores ramen al mejor precio"
            </div>
        </div>
    </aside>

    <script>
        let inventario = [
            { id: 1, nombre: "Buldak Rosé", precio: 2200, cat: "Ramen", img: "imagenes/rosé.png", cant: 0 },
            { id: 2, nombre: "Chappaggeti en pote", precio: 2500, cat: "Ramen Pote", img: "imagenes/chappa_pote.jpg", cant: 0 },
            { id: 3, nombre: "Jin Veggie", precio: 2200, cat: "Ramen", img: "imagenes/veggie.jpg", cant: 0 },
            { id: 4, nombre: "Topokki Agridulce y picante", precio: 2000, cat: "Topokkis", img: "imagenes/topokki_picante.png", cant: 0 },
            { id: 5, nombre: "Topokki Carbonara", precio: 2000, cat: "Topokkis", img: "imagenes/topokki_carbonara.png", cant: 0 },
            { id: 6, nombre: "Buldak Queso en pote", precio: 2500, cat: "Ramen Pote", img: "imagenes/potequeso.jpg", cant: 0 },
            { id: 7, nombre: "Chappaggeti", precio: 2000, cat: "Ramen", img: "imagenes/chappa.jpg", cant: 0 },
            { id: 8, nombre: "Buldak Carbonara", precio: 2500, cat: "Ramen", img: "imagenes/carbonara.png", cant: 0 },
        ];

        let catActual = 'todos';
        let textoBusqueda = '';

        function toggleCart() { document.getElementById('sideCart').classList.toggle('open'); }
        function filtrarPorNombre() { textoBusqueda = document.getElementById('searchInput').value.toLowerCase(); render(); }
        function filtrarCategoria(c) { catActual = c; document.querySelectorAll('.cat-pill').forEach(pill => pill.classList.remove('active')); event.currentTarget.classList.add('active'); render(); }

        function render() {
            const grid = document.getElementById('grid');
            const cartItems = document.getElementById('cartItems');
            const cartBadge = document.getElementById('cartCount');
            grid.innerHTML = ""; cartItems.innerHTML = "";
            let totalDinero = 0; let totalProductos = 0;

            inventario.forEach(p => {
                if ((catActual === 'todos' || p.cat === catActual) && p.nombre.toLowerCase().includes(textoBusqueda)) {
                    grid.innerHTML += `<div class="product-card">
                        <img src="${p.img}" class="prod-img">
                        <div style="font-weight:bold; font-size:14px; margin:5px 0;">${p.nombre}</div>
                        <div style="color:var(--rosa-corporativo); font-weight:bold; margin-bottom:8px;">$${p.precio.toLocaleString('es-CL')}</div>
                        <button class="btn-agregar-main" onclick="update(${p.id}, 1)">${p.cant > 0 ? 'Añadido ('+p.cant+')' : 'Agregar'}</button>
                    </div>`;
                }
                if(p.cant > 0) {
                    totalDinero += (p.precio * p.cant); totalProductos += p.cant;
                    cartItems.innerHTML += `<div class="cart-item">
                        <img src="${p.img}" style="width:35px; height:35px; object-fit:contain;">
                        <div style="flex:1"><b>${p.nombre}</b><br>${p.cant} unid.</div>
                        <div onclick="update(${p.id}, -${p.cant})" style="cursor:pointer; color:red; padding:10px;">🗑️</div>
                    </div>`;
                }
            });
            
            if(totalProductos > 0) {
                cartItems.innerHTML += `<div style="height: 180px; width: 100%; pointer-events: none;"></div>`;
                cartBadge.innerText = totalProductos; cartBadge.style.visibility = 'visible';
            } else { cartBadge.style.visibility = 'hidden'; }

            document.getElementById('totalCart').innerText = "Total: $" + totalDinero.toLocaleString('es-CL');
            if(totalDinero === 0) cartItems.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">Vacío</p>';
        }

        function update(id, delta) {
            const p = inventario.find(i => i.id === id);
            p.cant += delta; if(p.cant < 0) p.cant = 0;
            render();
        }

        function enviarWsp() {
            let pedido = inventario.filter(p => p.cant > 0);
            if(pedido.length === 0) return alert("Carrito vacío");
            let msg = "¡Hola AsianGarrit! 🍜 Quiero encargar:\n\n" + pedido.map(p => `- ${p.cant}x ${p.nombre}`).join("\n") + "\n\nTotal: " + document.getElementById('totalCart').innerText;
            window.open(`https://wa.me/56958420744?text=${encodeURIComponent(msg)}`);
        }

        render();
    </script>
</body>
</html>
